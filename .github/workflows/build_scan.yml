## THIS SCRIPT IS BUILD and  SCANNING

name: Build, Scan, Deploy

on:
    push:
        branches:
            - feature/**
            - main
jobs:
  build_scan:
    runs-on: ubuntu-latest
    outputs:
      image_tag: v${{ steps.build.outputs.image }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login into docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker image
        id: build
        run: |
          IMAGE=${{ secrets.DOCKER_USER }}/webapp01:latest
          docker build -t $IMAGE -f ./deployments/docker/Dockerfile .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Scan Docker Image for vulnerabilities
        uses: OWASP/DockSec@main
        with:
          dockerfile: deployments/docker/Dockerfile
          image: ${{ steps.build.outputs.image }}
          image_only: true

  push_image:
    runs-on: ubuntu-latest
    needs: build_scan
    steps:
      - name: Login into docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push Docker Image
        run: |
          docker push ${{ needs.build_scan.outputs.image_tag }}

      
