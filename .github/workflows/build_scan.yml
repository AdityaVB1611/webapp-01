name: Build, Scan, Deploy

on:
  push:
    branches:
      - feature/**
      - main

jobs:
  build_scan:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login into Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker image
        id: build
        run: |
          IMAGE=${{ secrets.DOCKER_USER }}/webapp01:latest
          docker build -t $IMAGE -f deployments/docker/Dockerfile .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Scan Docker image with DockSec
        uses: OWASP/DockSec@main
        with:
          dockerfile: deployments/docker/Dockerfile
          image: ${{ steps.build.outputs.image }}
          image_only: true

  push_image:
    runs-on: ubuntu-latest
    needs: build_scan
    steps:
      - name: Login into Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Debug image tag
        run: |
          echo "Resolved image tag: ${{ needs.build_scan.outputs.image_tag }}"

      - name: Push Docker image
        run: |
          docker push ${{ needs.build_scan.outputs.image_tag }}
